plugins:
  - jekyll-paginate
paginate: 6
paginate_path: "/blog/page:num/"
destination: "./docs"
excerpt_separator: <!--more-->
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
collections:
  posts:
    output: true
    permalink: /:categories/:title
  commissions:
    output: false
    sort_by: date_added
  miniatures:
    output: false
    sort_by: order